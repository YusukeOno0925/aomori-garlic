<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 | インノーマル</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/register.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16918246955"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
    
        // --- Google広告の測定ID（既存）---
        gtag('config', 'AW-16918246955');

        // --- GA4 の測定IDを追加 ---
        gtag('config', 'G-P2QH62VTEX');
    </script>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="Home.html" class="logo-link">
                <img src="images/company-logo.jpg" alt="インノーマルのロゴ" class="logo-image">
                <h1 class="logo">インノーマル</h1>
            </a>
        </div>
    </header>
    <main class="register-page">
        <section class="register-hero">
            <p class="register-kicker">START FOR FREE</p>
            <h2>近い人のキャリアから、次の選択を考える。</h2>
            <p class="register-lead">
                無料登録すると、キャリア事例の詳細や、年収・満足度・転職理由まで確認できます。
            </p>
    
            <div class="register-benefit-cards">
                <div>
                    <span>01</span>
                    <p>職業を選んだ理由や転職理由まで読める</p>
                </div>
                <div>
                    <span>02</span>
                    <p>年収レンジと満足度の推移を見られる</p>
                </div>
                <div>
                    <span>03</span>
                    <p>匿名ニックネームで質問・コメントできる</p>
                </div>
            </div>
        </section>
    
        <section class="register-card">
            <div class="register-card-header">
                <p class="register-card-kicker">FREE REGISTER</p>
                <h2>無料会員登録</h2>
                <p>30秒で登録できます。本名は公開されません。</p>
            </div>
    
            <form id="register-form" method="post">
                <label>
                    ユーザ名
                    <span>ニックネームでOKです</span>
                    <input type="text" name="username" placeholder="例）career.imnormal" required>
                </label>
    
                <label>
                    Emailアドレス
                    <span>ログインに使用します</span>
                    <input type="email" name="email" placeholder="mail@example.com" required>
                </label>
    
                <label>
                    パスワード
                    <span>8文字以上を推奨しています</span>
                    <input type="password" name="password" placeholder="パスワードを入力" required>
                </label>
    
                <button type="submit" id="register-button">
                    無料で登録する
                </button>
            </form>
    
            <p class="register-footer-text">
                すでにアカウントをお持ちの方は
                <a href="Login.html">ログイン</a>
            </p>
        </section>
    
        <div id="loading-popup" class="loading-popup" style="display: none;">
            <p>登録中です。少々お待ちください…</p>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-items">
                <p>&copy; 2026 Imnormal</p>
                <a href="https://www.instagram.com/imnormal_official/" target="_blank" aria-label="Instagram">
                    <img src="images/instagram-icon.png" alt="Instagram" class="instagram-icon">
                </a>
                <a href="https://www.linkedin.com/company/105660424/admin/page-posts/published/" target="_blank" aria-label="LinkedIn">
                    <img src="images/linkedin_icon.png" alt="LinkedIn" class="linkedin-icon">
                </a>
            </div>
        </div>
    </footer>

    <script src="js/register.js"></script>
</body>
</html>
