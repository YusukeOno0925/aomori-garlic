<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | インノーマル</title>
    <meta name="description" content="インノーマルの会員ログインページ。メールアドレスとパスワードでログインして、キャリア共有コミュニティにアクセスしましょう。">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16918246955"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
    
        gtag('config', 'AW-16918246955');
    </script>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="Home.html" class="logo-link">
                <img src="images/company-logo.jpg" alt="インノーマルのロゴ" class="logo-image">
                <h1 class="logo">インノーマル</h1>
            </a>
        </div>
    </header>
    <main class="login-page">
        <section class="login-hero">
            <p class="login-kicker">WELCOME BACK</p>
            <h2>キャリアの続きを、見にいく。</h2>
            <p class="login-lead">
                あなたに近いキャリア事例や、リアルな失敗・後悔から、
                これからの働き方を考えられます。
            </p>
    
            <div class="login-benefits">
                <div>
                    <span>01</span>
                    <p>自分に近いキャリア事例を探せる</p>
                </div>
                <div>
                    <span>02</span>
                    <p>失敗・後悔から学べる</p>
                </div>
                <div>
                    <span>03</span>
                    <p>年収・職種・志向を参考にできる</p>
                </div>
            </div>
        </section>
    
        <section class="login-card">
            <div class="login-card-header">
                <p class="login-card-kicker">LOGIN</p>
                <h2>ログイン</h2>
                <p>登録済みのメールアドレスとパスワードを入力してください。</p>
            </div>
    
            <form id="login-form">
                <label>
                    メールアドレス
                    <input type="email" name="email" placeholder="example@imnormal.jp" required>
                </label>
    
                <label>
                    パスワード
                    <input type="password" name="password" placeholder="パスワードを入力" required>
                </label>
    
                <button type="submit">ログインする</button>
            </form>
    
            <p id="error-message" class="error-message">
                ログインに失敗しました。メールアドレスまたはパスワードをご確認ください。
            </p>
    
            <div class="login-links">
                <p>アカウントをお持ちでない方は <a href="Register.html">新規登録</a></p>
                <p>パスワードをお忘れの方は <a href="Forgot_password.html">こちら</a></p>
            </div>
        </section>
    
        <div id="loading-indicator" class="loading-indicator" style="display: none;">
            <div class="spinner"></div>
            <p>ログイン中です...</p>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-items">
                <p>&copy; 2026 Imnormal</p>
                <a href="https://www.instagram.com/imnormal_official/" target="_blank" aria-label="Instagram">
                    <img src="images/instagram-icon.png" alt="Instagram" class="instagram-icon">
                </a>
                <a href="https://www.linkedin.com/company/105660424/admin/page-posts/published/" target="_blank" aria-label="LinkedIn">
                    <img src="images/linkedin_icon.png" alt="LinkedIn" class="linkedin-icon">
                </a>
            </div>
        </div>
    </footer>
    <script src="js/login.js"></script>
</body>
</html>
